<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <title>Private Cloud - Login</title>
</head>
<body>
{% block content %}
<div class="auth-container fade-in" style="max-width: 450px; margin: 4rem auto;">
    <div class="text-center mb-2">
        <h2 class="glitch" data-text="Private Cloud">Private Cloud</h2>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} mb-2" 
               style="font-size: 0.9rem; border-radius: 0;">
             {{ '' if category == 'error' else '' }}{{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card" style="border-color: var(--omega-cyan);">
        <form method="POST" action="/login" id="loginForm">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="user" placeholder="" required>
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">
                Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
</body>
</html>
