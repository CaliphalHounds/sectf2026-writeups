version: '3.8'

services:
  web:
    build: ./web
    ports:
      - "5000:5000"
    volumes:
      - shared-data:/shared

  bot:
    build: ./bot
    volumes:
      - shared-data:/shared
    environment:
      - FLAG=${FLAG:-clctf{cl0b_cl0bb3r3d_cl0bb3r1ng_cl0bcl0b}}
    depends_on:
      - web

volumes:
  shared-data:
